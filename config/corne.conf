# Uncomment the following line to enable deep sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Uncomment the following line to increase the keyboard's wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6

# Make sure BLE has enough buffers for a snappier link
CONFIG_BT_BUF_ACL_RX_COUNT=6
CONFIG_BT_BUF_ACL_TX_COUNT=6

# Prefer 1M PHY (better range than 2M when halves are apart)
CONFIG_BT_PHY_UPDATE=y
CONFIG_BT_CTLR_PHY_2M=n

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7

# Fix nice!view widgets not fully rendering / bottom of screen not refreshing
# (Zephyr 4.1 LVGL memory-pool starvation, ZMK issue #3219). Default is 4096.
# The built-in status screen enables layer+battery+output+peripheral widgets,
# which need more pool than the reporter's minimal set (they found 4608 w/ WPM
# off). 8192 gives headroom. If the bottom STILL won't refresh after flashing,
# the value must be forced via a config/Kconfig fragment (a plain .conf line can
# be shadowed by ZMK's conditional default in app/src/display/Kconfig).
CONFIG_LV_Z_MEM_POOL_SIZE=8192


# Uncomment the following line to enable USB Logging (this increases power usage by a significant amount, turn it off when not in use)
# CONFIG_ZMK_USB_LOGGING=y
