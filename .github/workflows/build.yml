on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    # Pinned to v0.3 to match the ZMK source revision in config/west.yml.
    # main's build workflow rejects the old `nice_nano_v2` board target (it
    # requires the new `//zmk` compat variant), but v0.3 source only knows the
    # old target. Keeping both on v0.3 keeps them consistent.
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3
